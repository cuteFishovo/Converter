<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转换工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f5f7fa;
        }

        /* 左侧栏 */
        .sidebar {
            width: 240px;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #34495e;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .nav-item:hover {
            background-color: #34495e;
            padding-left: 30px;
        }

        .nav-item.active {
            background-color: #3498db;
            border-left: 4px solid #2980b9;
        }

        /* 右侧 */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .page {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            min-height: 80vh;
        }

        .page.active {
            display: block;
        }

        .page h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .page p {
            color: #7f8c8d;
            font-size: 16px;
            line-height: 1.6;
        }

        .tool-box {
            margin-top: 30px;
            padding: 30px;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            text-align: center;
        }

        /* 百度跳转链接样式 */
        .baidu-link {
            margin-top: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .baidu-link:hover {
            transform: scale(1.05);
        }
        .main-text {
            font-size: 24px;
            color: #3498db;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .sub-text {
            font-size: 14px;
            color: #95a5a6;
        }
        .upload-area {
            border: 2px dashed #3498db;
            padding: 40px;
            border-radius: 10px;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
            background: #f8f9fa;
            text-align: center;
        }
        .upload-area:hover {
            background: #eef5ff;
        }
        #fileInput, #audioFileInput {
            display: none;
        }
        .preview-img {
            max-width: 100%;
            max-height: 300px;
            margin: 20px 0;
            border-radius: 8px;
            display: none;
        }
        .format-select {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin: 10px;
        }
        .convert-btn, .download-btn {
            padding: 12px 25px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }
        .convert-btn:hover, .download-btn:hover {
            background: #2980b9;
        }
        .download-btn {
            background: #27ae60;
            display: none;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
            text-align: center;
        }

        /* 适配移动端 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧栏 -->
    <div class="sidebar">
        <h2>转换工具</h2>
        <div class="nav-item active" data-target="page1">图片转格式</div>
        <div class="nav-item" data-target="page2">音频转格式</div>
        <div class="nav-item" data-target="page3">音频解析</div>
        <div class="nav-item" data-target="page4">视频解析</div>
    </div>

    <!-- 右侧栏 -->
    <div class="content">
        <!-- 图片转格式 -->
        <div id="page1" class="page active">
            <h1>图片转格式</h1>
            <p>支持JPG、PNG、WebP、GIF、BMP图片格式互转</p>
            
            <div class="upload-area" id="uploadArea">
                <p>点击或拖拽上传图片</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <img id="previewImage" class="preview-img" alt="预览图">
            
            <div style="text-align: center; margin: 20px 0;">
                <select class="format-select" id="outputFormat">
                    <option value="jpg">JPG</option>
                    <option value="png">PNG</option>
                    <option value="webp">WebP</option>
                    <option value="gif">GIF</option>
                    <option value="bmp">BMP</option>
                    <option value="jpeg">JPEG</option>
                </select>

                <button class="convert-btn" id="convertBtn">开始转换</button>
                <button class="download-btn" id="downloadBtn">下载转换后的图片</button>
            </div>

            <div class="result-box" id="resultBox">
                <h3>转换完成</h3>
                <img id="convertedImage" class="preview-img" style="display:block;">
            </div>
        </div>

        <!-- 音频转格式 -->
        <div id="page2" class="page">
            <h1>音频转格式</h1>
            <p>支持MP3、WAV、OGG、M4A音频格式互转</p>
            
            <div class="upload-area" id="audioUploadArea">
                <p>点击或拖拽上传音频</p>
                <input type="file" id="audioFileInput" accept="audio/*">
            </div>

            <div id="audioInfo" style="text-align:center; margin:15px 0; display:none;">
                <p id="audioFileName"></p>
            </div>
            
            <div style="text-align:center;">
                <select class="format-select" id="audioOutputFormat">
                    <option value="mp3">MP3</option>
                    <option value="wav">WAV</option>
                    <option value="ogg">OGG</option>
                    <option value="m4a">M4A</option>
                </select>

                <button class="convert-btn" id="audioConvertBtn">开始转换</button>
                <button class="download-btn" id="audioDownloadBtn">下载转换音频</button>
            </div>

            <div class="result-box" id="audioResultBox">
                <h3>音频转换完成</h3>
            </div>
        </div>

        <!-- 音频解析 -->
        <div id="page3" class="page">
            <h1>音频解析</h1>
            <div class="baidu-link" onclick="window.open('http://unlock.music.hi.cn/','_blank')">
                <div class="main-text">点击前往unlock.music.hi.cn</div>
                <div class="sub-text">本人不会太多html 暂时不会更好的音频解析 可前往unlock.music.hi.cn</div>
            </div>
        </div>

        <!-- 视频解析 -->
        <div id="page4" class="page">
            <h1>视频解析</h1>
            <div class="baidu-link" onclick="window.open('https://snapany.com/zh','_blank')">
                <div class="main-text">点击前往snapany.com</div>
                <div class="sub-text">本人不会太多html 暂时不会更好的音频解析 可前往snapany.com</div>
            </div>
        </div>
    </div>

    <script>
        const navItems = document.querySelectorAll('.nav-item');
        const pages = document.querySelectorAll('.page');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                
                const targetPage = item.getAttribute('data-target');
                
                pages.forEach(page => page.classList.remove('active'));
                document.getElementById(targetPage).classList.add('active');
            });
        });

        //图片转格式
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const outputFormat = document.getElementById('outputFormat');
        const resultBox = document.getElementById('resultBox');
        const convertedImage = document.getElementById('convertedImage');

        let originalFile = null;
        let convertedUrl = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { alert('请选择图片文件！'); return; }
            originalFile = file;
            previewImage.src = URL.createObjectURL(file);
            previewImage.style.display = 'block';
        });
        convertBtn.addEventListener('click', () => {
            if (!originalFile) { alert('请先上传图片！'); return; }
            const format = outputFormat.value;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = URL.createObjectURL(originalFile);
            img.onload = function () {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0,0);
                convertedUrl = canvas.toDataURL(`image/${format}`, 0.95);
                convertedImage.src = convertedUrl;
                resultBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
            };
        });
        downloadBtn.addEventListener('click', () => {
            if (!convertedUrl || !originalFile) return;
            const a = document.createElement('a');
            a.href = convertedUrl;
            const fullName = originalFile.name;
            const ext = outputFormat.value;
            const nameWithoutExt = fullName.replace(/\.[^/.]+$/, '');
            a.download = `${nameWithoutExt}-转换后.${ext}`;
            a.click();
        });

        const audioUpload = document.getElementById('audioUploadArea');
        const audioFile = document.getElementById('audioFileInput');
        const audioConvertBtn = document.getElementById('audioConvertBtn');
        const audioDownloadBtn = document.getElementById('audioDownloadBtn');
        const audioFormat = document.getElementById('audioOutputFormat');
        const audioResultBox = document.getElementById('audioResultBox');
        const audioInfo = document.getElementById('audioInfo');
        const audioFileName = document.getElementById('audioFileName');

        let audioBlob = null;
        let audioUrl = null;

        // 上传音频
        audioUpload.addEventListener('click', () => audioFile.click());
        audioFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('audio/')) { alert('请选择音频文件！'); return; }
            audioBlob = file;
            audioFileName.innerText = `文件名：${file.name}`;
            audioInfo.style.display = 'block';
        });

        // 转换音频
        audioConvertBtn.addEventListener('click', async () => {
            if (!audioBlob) { alert('请先上传音频！'); return; }
            const format = audioFormat.value;
            
            try {
                const arrayBuffer = await audioBlob.arrayBuffer();
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                // 转换为WAV格式（通用兼容）
                const wav = audioBufferToWav(audioBuffer);
                const blob = new Blob([wav], { type: `audio/${format}` });
                audioUrl = URL.createObjectURL(blob);
                
                audioResultBox.style.display = 'block';
                audioDownloadBtn.style.display = 'inline-block';
            } catch (err) {
                alert('转换失败：' + err.message);
            }
        });

        // 下载
        audioDownloadBtn.addEventListener('click', () => {
            if (!audioUrl || !audioBlob) return;
            const a = document.createElement('a');
            a.href = audioUrl;
            const fullName = audioBlob.name;
            const ext = audioFormat.value;
            const nameWithoutExt = fullName.replace(/\.[^/.]+$/, '');
            a.download = `${nameWithoutExt}-转换后.${ext}`;
            a.click();
        });

        //AudioBuffer 转 WAV
        function audioBufferToWav(buffer) {
            let length = buffer.length * buffer.numberOfChannels * 2 + 44;
            let arrayBuffer = new ArrayBuffer(length);
            let view = new DataView(arrayBuffer);
            let channels = [];
            let offset = 0;
            let pos = 0;

            // 写入WAV头
            const setUint16 = (data) => { view.setUint16(pos, data, true); pos += 2; };
            const setUint32 = (data) => { view.setUint32(pos, data, true); pos += 4; };
            setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
            setUint32(0x20746D66); setUint32(16); setUint16(1); setUint16(buffer.numberOfChannels);
            setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * buffer.numberOfChannels);
            setUint16(buffer.numberOfChannels * 2); setUint16(16); setUint32(0x61746164);
            setUint32(length - pos - 4);

            // 写入PCM数据
            for (let i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
            while (pos < length) {
                for (let i = 0; i < buffer.numberOfChannels; i++) {
                    let sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return arrayBuffer;
        }
    </script>
</body>
</html>
